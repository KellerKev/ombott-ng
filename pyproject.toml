# Dev environment for the self-maintained ombott fork (async/ASGI work).
# Packaging stays in setup.py; this file only configures the pixi dev env.
[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tool.pixi.dependencies]
python = "3.13.*"
pytest = ">=8"
pytest-asyncio = ">=0.23"
pip = "*"

[tool.pixi.pypi-dependencies]
uvicorn = ">=0.30"
httpx = ">=0.27"
asgiref = ">=3.8"
websockets = ">=12"

[tool.pixi.tasks]
test = "pytest -q"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
